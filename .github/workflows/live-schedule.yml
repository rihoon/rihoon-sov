name: live-schedule-sync

on:
  schedule:
    - cron: '0 0 29 * *'   # 매월 29일 00:00 UTC = 한국 09:00 (다음 달 공개)
  workflow_dispatch: {}      # 수동 실행 버튼 (중간에 일정 바뀌면 여기서 Run)

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 노션 일정 → JSON
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        run: python live_schedule_sync.py
      - name: 변경 시 커밋·푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/live-schedule.json
          git diff --cached --quiet || git commit -m "라이브 일정 자동 갱신 (노션 동기화)"
          git push
